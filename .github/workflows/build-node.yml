name: Build Node
on:
  push:
    branches: [main]
    paths: ['node/cli/**', 'core/**', 'Cargo.*']
  workflow_dispatch:
env:
  REGISTRY: ghcr.io/frane/distrain
permissions:
  contents: read
  packages: write
jobs:
  build-cuda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./node/cli/Dockerfile.cuda
          push: true
          tags: ${{ env.REGISTRY }}/node-cuda:${{ github.sha }},${{ env.REGISTRY }}/node-cuda:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./node/cli/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/node:${{ github.sha }},${{ env.REGISTRY }}/node:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
