name: Build Node GPU
on:
  push:
    branches: [main]
    paths: ['node/cli/Dockerfile.runpod']
  workflow_dispatch:
env:
  REGISTRY: ghcr.io/frane/distrain
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./node/cli/Dockerfile.runpod
          push: true
          tags: ${{ env.REGISTRY }}/node-gpu:${{ github.sha }},${{ env.REGISTRY }}/node-gpu:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
