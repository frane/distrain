name: Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/frane/distrain

permissions:
  contents: read
  packages: write

jobs:
  build-coordinator:
    name: Build Coordinator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push Coordinator
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./coordinator/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/coordinator:${{ github.sha }},${{ env.REGISTRY }}/coordinator:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-node:
    name: Build Node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push Node
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./node/cli/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/node:${{ github.sha }},${{ env.REGISTRY }}/node:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check
        run: cargo check -p distrain-coordinator -p distrain-node -p distrain-model -p distrain-shared -p distrain-ffi
      - name: Test
        run: cargo test -p distrain-coordinator -p distrain-node -p distrain-model -p distrain-shared
