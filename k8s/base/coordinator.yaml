apiVersion: apps/v1
kind: Deployment
metadata:
  name: coordinator
  namespace: distrain
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coordinator
  template:
    metadata:
      labels:
        app: coordinator
    spec:
      containers:
      - name: coordinator
        image: ghcr.io/frane/distrain/coordinator:latest
        ports:
        - containerPort: 8000
        env:
        - name: RUST_LOG
          value: "info"
        - name: MIN_CONTRIBUTIONS
          value: "2"
        - name: KEEP_VERSIONS
          value: "5"
        - name: VOCAB_SIZE
          value: "32768"
        - name: R2_ENDPOINT
          value: "http://minio.distrain:9000"
        - name: R2_BUCKET
          value: "distrain-training"
        - name: R2_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: distrain-secrets
              key: minio-access-key
        - name: R2_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: distrain-secrets
              key: minio-secret-key
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: coordinator
  namespace: distrain
spec:
  type: LoadBalancer
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: coordinator
